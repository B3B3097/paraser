name: VLESS Parser

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Xray
        run: |
          mkdir -p bin
          cd bin
          wget https://github.com/XTLS/Xray-core/releases/download/v1.8.13/Xray-linux-64.zip
          unzip -j Xray-linux-64.zip xray
          chmod +x xray
          rm Xray-linux-64.zip

      - name: Download Sing-box
        run: |
          cd bin
          wget https://github.com/SagerNet/sing-box/releases/download/v1.9.0/sing-box-1.9.0-linux-amd64.tar.gz
          tar xzf sing-box-1.9.0-linux-amd64.tar.gz
          chmod +x sing-box
          rm sing-box-1.9.0-linux-amd64.tar.gz

      - name: Run parser
        run: python3 main.py

      - name: Push results
        run: |
          git config user.name bot
          git config user.email bot@bot.bot
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "update" && git push)
