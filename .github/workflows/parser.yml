name: VLESS Parser (Xray + Sing-box)

on:
  schedule:
    - cron: '0 */2 * * *'   # каждые 2 часа
  workflow_dispatch:         # ручной запуск

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create bin directory
        run: mkdir -p bin

      - name: Download Xray
        run: |
          cd bin
          wget -q https://github.com/XTLS/Xray-core/releases/download/1.8.13/Xray-linux-64.zip
          unzip -j Xray-linux-64.zip xray
          chmod +x xray
          rm Xray-linux-64.zip
          cd ..

      - name: Download Sing-box
        run: |
          cd bin
          wget -q https://github.com/SagerNet/sing-box/releases/download/v1.9.0/sing-box-1.9.0-linux-amd64.tar.gz
          tar -xzf sing-box-1.9.0-linux-amd64.tar.gz
          chmod +x sing-box
          rm sing-box-1.9.0-linux-amd64.tar.gz
          cd ..

      - name: Run parser
        run: python parser.py
        timeout-minutes: 55
        env:
          PYTHONUNBUFFERED: 1

      - name: Show statistics
        if: always()
        run: |
          if [ -f stats.json ]; then
            echo "=== Статистика ==="
            cat stats.json
          else
            echo "stats.json не найден"
          fi

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.txt stats.json 2>/dev/null || true
          if ! git diff --quiet --cached; then
            git commit -m "Auto-update: VLESS configs [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
