name: VLESS Ultimate Parser

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests pysocks
      
      - name: Download xray binary
        run: |
          mkdir -p bin
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -j Xray-linux-64.zip xray -d bin/ || true
          chmod +x bin/xray || true
      
      - name: Run parser
        run: python parser.py
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "*.txt" stats.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update VLESS configs"
          git push || true
