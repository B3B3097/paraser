name: VLESS MegaParser с HTTP проверкой

on:
  schedule:
    # Запуск каждый час (в 00 минут)
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      max_threads:
        description: 'Количество потоков'
        required: false
        default: '30'
      max_configs:
        description: 'Максимум конфигов'
        required: false
        default: '500'

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout репозитория
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Установка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Установка зависимостей
        run: |
          python -m pip install --upgrade pip

      - name: 🔧 Запуск MegaParser
        run: |
          python parser.py --verbose --push
        env:
          PYTHONUNBUFFERED: 1
          GITHUB_ACTIONS: 'true'

      - name: 📊 Показать статистику
        if: always()
        run: |
          if [ -f stats.json ]; then
            echo "=== Статистика ==="
            cat stats.json
          else
            echo "stats.json не найден"
          fi
          if [ -f parser.log ]; then
            echo "=== Лог файл (последние 100 строк) ==="
            tail -100 parser.log
          else
            echo "parser.log не найден"
          fi