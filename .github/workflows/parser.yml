name: VLESS Parser (Xray + Sing-box)

on:
  schedule:
    - cron: '0 */4 * * *'   # каждые 4 часа
  workflow_dispatch:         # ручной запуск

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create bin directory
        run: mkdir -p bin

      - name: Download Xray
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -j Xray-linux-64.zip xray -d bin/
          chmod +x bin/xray

      - name: Download Sing-box
        run: |
          wget -q https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-linux-amd64.tar.gz
          tar -xzf sing-box-linux-amd64.tar.gz
          mv sing-box-*/sing-box bin/
          chmod +x bin/sing-box

      - name: Install dependencies (none, uses only standard library)
        run: echo "No extra dependencies needed"

      - name: Run parser
        run: python parser.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update VLESS configs [skip ci]"
          git push