name: VLESS Parser - Hourly Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      max_xray:
        description: 'Max configs in Xray output (default: 200)'
        required: false
        default: '200'
      max_tcptls:
        description: 'Max configs in TCP+TLS output (default: 500)'
        required: false
        default: '500'
      tcp_concurrency:
        description: 'Stage 1 TCP parallel checks (default: 80)'
        required: false
        default: '80'
      xray_concurrency:
        description: 'Stage 3 Xray parallel checks (default: 12)'
        required: false
        default: '12'
      xray_timeout:
        description: 'Stage 3 Xray timeout seconds (default: 15)'
        required: false
        default: '15'

permissions:
  contents: write

jobs:
  parse-and-check:
    name: "Fetch -> TCP -> TLS -> White -> Xray -> commit"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install --quiet 'requests[socks]'

      - name: Download Xray-core (latest release)
        run: |
          echo "Resolving latest Xray-core version..."
          XRAY_VER=$(curl -sf https://api.github.com/repos/XTLS/Xray-core/releases/latest \
            | grep '"tag_name"' | head -1 | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')
          echo "Xray version: ${XRAY_VER}"
          curl -fLo /tmp/xray.zip \
            "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VER}/Xray-linux-64.zip"
          unzip -oq /tmp/xray.zip xray -d /tmp/
          chmod +x /tmp/xray
          echo "XRAY_PATH=/tmp/xray" >> $GITHUB_ENV
          /tmp/xray version | head -1

      - name: Override parameters (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          sed -i "s/^MAX_XRAY   = .*/MAX_XRAY   = ${{ github.event.inputs.max_xray }}/" parser.py
          sed -i "s/^MAX_TCPTLS = .*/MAX_TCPTLS = ${{ github.event.inputs.max_tcptls }}/" parser.py
          sed -i "s/^TCP_CONCURRENCY  = .*/TCP_CONCURRENCY  = ${{ github.event.inputs.tcp_concurrency }}/" parser.py
          sed -i "s/^XRAY_CONCURRENCY = .*/XRAY_CONCURRENCY = ${{ github.event.inputs.xray_concurrency }}/" parser.py
          sed -i "s/^XRAY_TIMEOUT  = .*/XRAY_TIMEOUT  = ${{ github.event.inputs.xray_timeout }}/" parser.py

      - name: Run parser (Fetch + TCP + TLS + Whitelist + Xray)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          XRAY_PATH: ${{ env.XRAY_PATH }}
        run: python parser.py

      - name: Show stats
        run: |
          echo "──────────── stats.json ────────────"
          cat stats.json
          echo "────────────────────────────────────"

      - name: Commit updated configs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            OSTATSYA_NA_SVYAZI.txt \
            OSTATSYA_NA_SVYAZI_base64.txt \
            OSTATSYA_NA_SVYAZI_tcptls.txt \
            OSTATSYA_NA_SVYAZI_tcptls_base64.txt \
            stats.json

          if git diff --cached --quiet; then
            echo "Nothing changed -- skip commit."
          else
            XRAY=$(python3  -c "import json; d=json.load(open('stats.json')); print(d['output_xray'])")
            TLS=$(python3   -c "import json; d=json.load(open('stats.json')); print(d['output_tcptls'])")
            WHITE=$(python3 -c "import json; d=json.load(open('stats.json')); print(d['whitelisted_pool'])")
            TOTAL=$(python3 -c "import json; d=json.load(open('stats.json')); print(d['total_fetched'])")
            SPD=$(python3   -c "import json; d=json.load(open('stats.json')); print(d.get('avg_speed_mbps',0))")
            USED=$(python3  -c "import json; d=json.load(open('stats.json')); print('xray+tls+tcp' if d['xray_used'] else 'tls+tcp')")
            git commit -m "chore: xray=${XRAY} tcptls=${TLS} white=${WHITE} of ${TOTAL} spd=${SPD}MB/s [${USED}] -- $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
