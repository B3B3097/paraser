name: Update README and Subscription Title

"on":
  workflow_run:
    workflows: ["OSTATSYA NA SVYAZI - Hourly Update"]
    types: [completed]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-meta:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Update README with MSK time
        run: python3 update_meta.py

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          STAMP=$(TZ=Europe/Moscow date '+%d.%m.%Y %H:%M MSK')
          git commit -m "meta: README timestamp $STAMP"
          git fetch origin main
          git rebase origin/main || git rebase --abort || true
          git push origin HEAD:main || echo "Push failed"
