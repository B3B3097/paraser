name: Update README and Subscription Title

"on":
  workflow_run:
    workflows: ["OSTATSYA NA SVYAZI - Hourly Update"]
    types: [completed]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-meta:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Update README with MSK time
        run: |
          python3 - << 'PYEOF'
import json, re
from pathlib import Path
from datetime import datetime, timezone, timedelta

TZ_MSK = timezone(timedelta(hours=3))
now = datetime.now(TZ_MSK)
ts_msk = now.strftime("%d.%m.%Y %H:%M") + " МСК"

total = 0
try:
    raw = Path("status2.txt").read_text()
    if raw.strip().startswith("{"):
        d = json.loads(raw)
        total = int(d.get("total_count", 0))
except Exception:
    pass
if total == 0 and Path("v2ray_sub.txt").exists():
    with open("v2ray_sub.txt") as f:
        total = sum(1 for l in f if l.startswith(("vless://","vmess://","trojan://","ss://")))

print(f"Confs: {total} | Time: {ts_msk}")

# Обновляем ТОЛЬКО README.md
# v2ray_sub.txt обновляет только checker.py после реальной проверки конфигов
if Path("README.md").exists():
    content = Path("README.md").read_text(encoding="utf-8")
    pattern = r"\*Последнее обновление: [^*]+\*"
    replacement = f"*Последнее обновление: {ts_msk}*"
    new_content = re.sub(pattern, replacement, content)
    if new_content != content:
        Path("README.md").write_text(new_content, encoding="utf-8")
        print("OK: README.md updated")
    else:
        print("README.md: no change needed")
PYEOF

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          STAMP=$(TZ=Europe/Moscow date '+%d.%m.%Y %H:%M MSK')
          git commit -m "meta: README timestamp $STAMP"
          git fetch origin main
          git rebase origin/main || git rebase --abort || true
          git push origin HEAD:main || echo "Push failed"
