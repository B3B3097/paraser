name: OSTATSYA NA SVYAZI - Hourly Update

"on":
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: xray-config-checker
  cancel-in-progress: false

jobs:
  run-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 110

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Done: Dependencies installed"

      - name: Run checker with timeout protection
        timeout-minutes: 100
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          timeout 5900 python3 checker.py 2>&1 | tee checker.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 124 ]; then
            echo "Checker exceeded time limit"
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "Checker exited with code $EXIT_CODE"
          else
            echo "Checker completed successfully"
          fi
          exit 0

      - name: Create status file
        run: |
          TIMESTAMP=$(TZ=Europe/Moscow date '+%d.%m.%Y %H:%M MSK')
          INTERNET=$(wc -l < valid_internet_links.txt 2>/dev/null || echo 0)
          WHITELIST=$(wc -l < valid_whitelist_links.txt 2>/dev/null || echo 0)
          TOTAL=$((INTERNET + WHITELIST))
          printf '{\n  "last_update_msk": "%s",\n  "internet_count": %s,\n  "whitelist_count": %s,\n  "total_count": %s,\n  "checker_status": "completed"\n}\n' \
            "$TIMESTAMP" "$INTERNET" "$WHITELIST" "$TOTAL" > status2.txt
          echo "Status: $TIMESTAMP I=$INTERNET W=$WHITELIST T=$TOTAL"

      - name: Save operator stats
        run: |
          if [ -f operator_classifier.py ] && [ -f tpsu_bypass.py ]; then
            mkdir -p misc/modules
            cp operator_classifier.py tpsu_bypass.py misc/modules/ 2>/dev/null || true
          fi

      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f v2ray_sub.txt valid_internet_links.txt valid_whitelist_links.txt status2.txt 2>/dev/null || true
          git add stats.json cloudflare_checker.py cf_ip_utils.py sni_scanner.py 2>/dev/null || true
          git add operator_classifier.py tpsu_bypass.py 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          TIMESTAMP=$(TZ=Europe/Moscow date '+%d.%m.%Y %H:%M MSK')
          INTERNET=$(wc -l < valid_internet_links.txt 2>/dev/null || echo 0)
          WHITELIST=$(wc -l < valid_whitelist_links.txt 2>/dev/null || echo 0)
          TOTAL=$((INTERNET + WHITELIST))
          git commit -m "chore: update configs I=$INTERNET W=$WHITELIST T=$TOTAL $TIMESTAMP"
          git fetch origin main
          git rebase origin/main || git rebase --abort || true
          git push origin HEAD:main || echo "Push failed, retry next run"

